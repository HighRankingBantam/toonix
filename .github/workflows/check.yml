name: flake check

# Validates the flake on every push/PR. This is the automated version of the
# static review done while authoring — it actually evaluates the whole NixOS
# config (catching missing attrs, wrong option names, type errors) on real Nix.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      # Eval-only: evaluates nixosConfigurations + the `checks` output (the full
      # system closure) without realising multi-GB builds. Fast, and catches the
      # class of errors that block a rebuild (bad attrs/options/types).
      - name: nix flake check (eval)
        run: nix flake check --no-build --print-build-logs

      # Optional full build of the system closure (heavier — pulls the Thorium
      # AppImage + builds everything). Enable by removing `if: false`.
      - name: build system closure (full)
        if: false
        run: nix build .#nixosConfigurations.nixos-vm.config.system.build.toplevel --print-build-logs
