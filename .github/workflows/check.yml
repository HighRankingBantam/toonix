name: flake check

# Validates the flake on every push/PR. `eval` is the fast gate (catches bad
# attrs/options/types on real nixos-unstable). `build` realises the whole system
# closure (Thorium AppImage, Floorp, SDDM/Plymouth themes, desktop-file-validate
# — everything short of actually booting).
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
      - name: nix flake check (eval)
        run: nix flake check --no-build --print-build-logs

      # Emit the resolved flake.lock so it can be committed to pin the repo to a
      # known-good nixpkgs (no local Nix needed to generate it). Removed once the
      # lock is committed.
      - name: lock inputs
        run: nix flake lock
      - uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock
          if-no-files-found: error

  build:
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # A full Hyprland-desktop closure (Floorp, Thorium, LibreOffice, kdenlive,
      # Qt, GNOME bits) is large; reclaim ~20 GB the runner ships preinstalled.
      - name: free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost /usr/local/.ghcup /usr/lib/jvm \
                      "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: build system closure (full)
        run: |
          nix build --print-build-logs \
            '.#nixosConfigurations.toonix.config.system.build.toplevel'
