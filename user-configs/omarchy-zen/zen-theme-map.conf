# Format: omarchy-theme-name=zen-extension-id
#
# To find a theme's extension ID:
#   1. Install the theme in Zen Browser
#   2. Run: grep "activeThemeID" ~/.config/zen/*/prefs.js
#   3. Add the ID here
#
